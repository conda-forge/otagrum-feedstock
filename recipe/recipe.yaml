context:
  version: "0.13"

package:
  name: otagrum
  version: ${{ version }}

source:
  url: https://github.com/openturns/otagrum/archive/v${{ version }}.tar.gz
  sha256: 41f3a706fd9fc9ba073052b291f382cd2d080a3a2d8f4bec6e04edd02f5fd92d

build:
  number: 2
  python:
    version_independent: true

requirements:
  build:
    - cmake
    - swig
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - if: unix
      then: make
      else: ninja
    - if: win
      then: m2-diffutils
    - if: build_platform != target_platform
      then:
        - python-abi3 ${{ python_min }}.*
        - python ${{ python_min }}.*
        - cross-python_${{ target_platform }}
  host:
    - python-abi3 ${{ python_min }}.*
    - python ${{ python_min }}.*
    - openturns
    - pyagrum
  run:
    - python >=${{ python_min }}
  run_exports:
    - ${{ pin_subpackage('otagrum', upper_bound='x.x') }}

tests:
  - python:
      imports:
        - otagrum
      pip_check: false

about:
  homepage: http://openturns.org/
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: COPYING.LESSER
  summary: OT/aGrUM module
  documentation: https://openturns.github.io/otagrum/master/
  repository: https://github.com/openturns/otagrum

extra:
  recipe-maintainers:
    - jschueller
